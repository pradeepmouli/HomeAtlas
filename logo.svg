<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="house" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F0F0;stop-opacity:0.95" />
    </linearGradient>
    <clipPath id="houseClip">
      <!-- House silhouette used as clip for globe lines -->
      <path d="M256 108 L410 230 L410 404 Q410 420 394 420 L118 420 Q102 420 102 404 L102 230 Z"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>

  <!-- House silhouette - Apple Home inspired -->
  <path d="
    M256 108
    L410 230
    L410 404
    Q410 420 394 420
    L118 420
    Q102 420 102 404
    L102 230
    Z
  " fill="url(#house)" opacity="0.95"/>

  <!-- Globe/atlas lines clipped inside the house -->
  <g clip-path="url(#houseClip)" stroke="#FF9500" stroke-width="2.5" fill="none" opacity="0.3">
    <!-- Horizontal latitude lines -->
    <ellipse cx="256" cy="260" rx="140" ry="140"/>
    <ellipse cx="256" cy="260" rx="140" ry="45"/>
    <ellipse cx="256" cy="260" rx="140" ry="95"/>
    <line x1="116" y1="260" x2="396" y2="260"/>

    <!-- Vertical longitude lines -->
    <ellipse cx="256" cy="260" rx="45" ry="140"/>
    <ellipse cx="256" cy="260" rx="95" ry="140"/>
    <line x1="256" y1="120" x2="256" y2="400"/>
  </g>

  <!-- Chimney -->
  <rect x="340" y="148" width="36" height="72" rx="6" ry="6" fill="url(#house)" opacity="0.95"/>

  <!-- Roof peak accent line -->
  <path d="M256 108 L410 230" stroke="white" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M256 108 L102 230" stroke="white" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Door -->
  <rect x="228" y="320" width="56" height="100" rx="28" ry="28" fill="#FF9500" opacity="0.85"/>

  <!-- Door knob / compass point -->
  <circle cx="250" cy="375" r="5" fill="white" opacity="0.9"/>

  <!-- Window left -->
  <circle cx="172" cy="300" r="28" fill="none" stroke="#FF9500" stroke-width="4" opacity="0.5"/>
  <line x1="172" y1="272" x2="172" y2="328" stroke="#FF9500" stroke-width="3" opacity="0.4"/>
  <line x1="144" y1="300" x2="200" y2="300" stroke="#FF9500" stroke-width="3" opacity="0.4"/>

  <!-- Window right -->
  <circle cx="340" cy="300" r="28" fill="none" stroke="#FF9500" stroke-width="4" opacity="0.5"/>
  <line x1="340" y1="272" x2="340" y2="328" stroke="#FF9500" stroke-width="3" opacity="0.4"/>
  <line x1="312" y1="300" x2="368" y2="300" stroke="#FF9500" stroke-width="3" opacity="0.4"/>
</svg>